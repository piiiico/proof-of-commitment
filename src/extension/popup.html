<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 360px;
        min-height: 400px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: #0a0a0a;
        color: #e5e5e5;
        padding: 16px;
      }
      h1 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 4px;
        color: #fff;
      }
      .subtitle {
        font-size: 12px;
        color: #888;
        margin-bottom: 16px;
      }
      .auth-section {
        background: #1a1a1a;
        border-radius: 8px;
        padding: 16px;
        margin-bottom: 16px;
        text-align: center;
      }
      .auth-section p {
        font-size: 13px;
        color: #aaa;
        margin-bottom: 12px;
      }
      button {
        background: #fff;
        color: #000;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #ddd;
      }
      .stats {
        list-style: none;
      }
      .stats li {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #222;
        font-size: 13px;
      }
      .stats li:last-child {
        border-bottom: none;
      }
      .domain {
        color: #fff;
        font-weight: 500;
      }
      .time {
        color: #888;
      }
      .empty {
        text-align: center;
        color: #555;
        padding: 40px 0;
        font-size: 13px;
      }
      .verified-badge {
        color: #4ade80;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .verification-detail {
        font-size: 11px;
        color: #666;
        margin-bottom: 10px;
      }
      .btn-secondary {
        background: transparent;
        color: #888;
        border: 1px solid #333;
        padding: 6px 14px;
        font-size: 12px;
      }
      .btn-secondary:hover {
        border-color: #555;
        color: #aaa;
      }
      .error-text {
        color: #f87171;
        font-size: 12px;
        margin-bottom: 10px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <h1>Proof of Commitment</h1>
    <p class="subtitle">Your verified behavioral data</p>

    <div id="auth-section" class="auth-section">
      <!-- Unauthenticated state -->
      <div id="auth-prompt">
        <p>Verify you're a unique human to contribute anonymous data.</p>
        <button id="auth-btn">Sign in with World ID</button>
      </div>
      <!-- Authenticated state -->
      <div id="auth-status" style="display: none">
        <div class="verified-badge">✓ Verified Human</div>
        <p class="verification-detail" id="verification-level"></p>
        <button id="signout-btn" class="btn-secondary">Sign out</button>
      </div>
      <!-- Loading state -->
      <div id="auth-loading" style="display: none">
        <p>Verifying...</p>
      </div>
      <!-- Error state -->
      <div id="auth-error" style="display: none">
        <p class="error-text" id="error-message"></p>
        <button id="retry-btn">Try again</button>
      </div>
    </div>

    <ul id="stats" class="stats"></ul>
    <div id="empty" class="empty" style="display: none">
      Browse the web. Your commitments will appear here.
    </div>

    <script src="popup.js"></script>
  </body>
</html>
